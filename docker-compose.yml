version: '3.8'

services:
  # PostgreSQL with PostGIS extension for spatial queries
  postgres:
    image: postgis/postgis:15-3.3
    container_name: forksync_postgres
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-password}
      POSTGRES_DB: ${PG_DB:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount our schema script so it automatically runs on first boot
      - ./postgres/schemas/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5
    container_name: forksync_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      # Accept license agreement (required for enterprise features if toggled, fine for community)
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt connection port
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # Data Loader
  data-loader:
    build: .
    container_name: forksync_data_loader
    env_file: .env
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_started
    command: >
      sh -c "
      echo 'Waiting for databases to initialize...' &&
      sleep 20 &&
      echo 'Running PostgreSQL Data Loader (seed_db.py)...' &&
      python -m utils.seed_db &&
      echo 'Running Neo4j Sync (sync_to_neo4j.py)...' &&
      python -m utils.sync_to_neo4j &&
      echo 'Initialization Complete!'
      "

volumes:
  postgres_data:
  neo4j_data:
